<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <title>TV Tracker</title>

  <!-- PWA / iOS "Add to Home Screen" -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TV Tracker" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-row">
      <h1>📺 TV Tracker</h1>
      <div class="header-actions">
        <span id="syncStatus" class="sync-status" title="Sync status"></span>
        <button id="menuBtn" class="icon-btn" aria-label="Menu">⋯</button>
      </div>
    </div>
    <div id="stats" class="stats"></div>
    <input id="search" class="search" type="search" placeholder="Search shows…" autocomplete="off" />
    <nav id="filters" class="filters">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="watching">Watching</button>
      <button class="chip" data-filter="completed">Completed</button>
      <button class="chip" data-filter="plan">Plan to watch</button>
      <button class="chip" data-filter="dropped">Dropped</button>
      <button class="chip" data-filter="favorite">★ Favorites</button>
    </nav>
  </header>

  <main id="list" class="list"></main>

  <button id="addBtn" class="fab" aria-label="Add show">＋</button>

  <!-- Menu sheet -->
  <div id="menuSheet" class="sheet hidden">
    <div class="sheet-card">
      <h2>Menu</h2>
      <button class="sheet-item" id="syncNowBtn">☁️ Sync with Google Drive now</button>
      <button class="sheet-item" id="fetchBtn">🖼️ Fetch posters &amp; episode counts</button>
      <button class="sheet-item" id="rematchBtn">🔁 Re-match all posters (fix wrong ones)</button>
      <button class="sheet-item" id="settingsBtn">⚙️ Settings (API keys)</button>
      <button class="sheet-item" id="exportBtn">⬇️ Export data (backup)</button>
      <button class="sheet-item" id="importBtn">⬆️ Import data</button>
      <button class="sheet-item" id="resetBtn">↺ Reload from bundled data</button>
      <button class="sheet-item close" data-close>Cancel</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </div>

  <!-- Edit / Add dialog -->
  <div id="editSheet" class="sheet hidden">
    <div class="sheet-card">
      <h2 id="editTitle">Edit show</h2>
      <div id="tmdbSearchWrap" class="tmdb-search hidden">
        <label>Find / fix match (TMDB)
          <input id="tmdbQuery" type="text" placeholder="Type a show name to search…" autocomplete="off" />
        </label>
        <div id="tmdbResults" class="tmdb-results"></div>
      </div>
      <label>Name
        <input id="f_name" type="text" placeholder="Show name" />
      </label>
      <label>Status
        <select id="f_status">
          <option value="watching">Watching</option>
          <option value="completed">Completed</option>
          <option value="plan">Plan to watch</option>
          <option value="dropped">Dropped</option>
        </select>
      </label>
      <label>Episodes seen
        <input id="f_episodes" type="number" min="0" inputmode="numeric" />
      </label>
      <label>Rating (0–5)
        <input id="f_rating" type="number" min="0" max="5" step="0.5" inputmode="decimal" />
      </label>
      <label class="checkbox">
        <input id="f_favorite" type="checkbox" /> Favorite ★
      </label>
      <div class="sheet-actions">
        <button class="btn danger" id="deleteBtn">Delete</button>
        <button class="btn ghost" data-close>Cancel</button>
        <button class="btn primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings dialog -->
  <div id="settingsSheet" class="sheet hidden">
    <div class="sheet-card">
      <h2>Settings</h2>
      <p class="hint">Keys are stored only on this device, never uploaded to GitHub.</p>
      <label>TMDB API key
        <input id="s_tmdb" type="text" placeholder="For posters &amp; episode data" autocomplete="off" />
      </label>
      <label>Google OAuth Client ID
        <input id="s_client" type="text" placeholder="For Google Drive sync" autocomplete="off" />
      </label>
      <label class="checkbox">
        <input id="s_autosync" type="checkbox" /> Auto-sync to Google Drive on changes
      </label>
      <button class="btn ghost" id="connectDriveBtn">Connect Google Drive</button>
      <div class="sheet-actions">
        <button class="btn ghost" data-close>Cancel</button>
        <button class="btn primary" id="saveSettingsBtn">Save</button>
      </div>
    </div>
  </div>

  <script async src="https://accounts.google.com/gsi/client"></script>
  <script src="settings.js"></script>
  <script src="tmdb.js"></script>
  <script src="drive.js"></script>
  <script src="app.js"></script>
</body>
</html>
